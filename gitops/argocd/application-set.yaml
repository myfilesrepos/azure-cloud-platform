apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-applications
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: todo-app-dev
          - env: prod
            namespace: todo-app-prod
  template:
    metadata:
      name: 'todo-app-{{env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/myfilesrepos/platform-engineering.git
        targetRevision: main
        path: 'gitops/overlays/{{env}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "1m"
