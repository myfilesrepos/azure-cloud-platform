apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-app

resources:
  - ../../base

labels:
  - pairs:
      environment: dev

replicas:
  - name: backend
    count: 1

  - name: frontend
    count: 1

images:
  - name: backend
    newName: 3tieracr.azurecr.io/3tier-azure/backend
    newTag: initial

  - name: frontend
    newName: 3tieracr.azurecr.io/3tier-azure/frontend
    newTag: initial


patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
