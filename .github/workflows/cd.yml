name: CD - GitOps Deployment
on:
  workflow_run:
    workflows:
      - "CI - Build and Security Scan"
    types:
      - completed

permissions:
  contents: write

env:
  ACR_LOGIN_SERVER: 3tieracr.azurecr.io
  BACKEND_IMAGE: 3tier-azure/backend
  FRONTEND_IMAGE: 3tier-azure/frontend

jobs:

# DEV DEPLOYMENT
  deploy-dev:

    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    environment:
      name: dev

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Install Kustomize
        run: |
          curl -s \
          https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh \
          | bash

          sudo mv kustomize /usr/local/bin/

      - name: Update Backend Image
        working-directory: gitops/overlays/dev
        run: |
          kustomize edit set image \
          backend=${ACR_LOGIN_SERVER}/${BACKEND_IMAGE}:${IMAGE_TAG}

      - name: Update Frontend Image
        working-directory: gitops/overlays/dev
        run: |
          kustomize edit set image \
          frontend=${ACR_LOGIN_SERVER}/${FRONTEND_IMAGE}:${IMAGE_TAG}

      - name: Commit Changes
        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email \
          "github-actions[bot]@users.noreply.github.com"

          git add gitops/overlays/dev/kustomization.yaml

          git commit -m \
          "Deploy dev image ${IMAGE_TAG} [skip ci]" \
          || echo "No changes"

          git pull --rebase origin main

          git push origin main

# PROD DEPLOYMENT
  deploy-prod:

    runs-on: ubuntu-latest

    needs: deploy-dev

    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    environment:
      name: prod

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Install Kustomize
        run: |
          curl -s \
          https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh \
          | bash

          sudo mv kustomize /usr/local/bin/

      - name: Update Backend Image
        working-directory: gitops/overlays/prod
        run: |
          kustomize edit set image \
          backend=${ACR_LOGIN_SERVER}/${BACKEND_IMAGE}:${IMAGE_TAG}

      - name: Update Frontend Image
        working-directory: gitops/overlays/prod
        run: |
          kustomize edit set image \
          frontend=${ACR_LOGIN_SERVER}/${FRONTEND_IMAGE}:${IMAGE_TAG}

      - name: Commit Changes
        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email \
          "github-actions[bot]@users.noreply.github.com"

          git add gitops/overlays/prod/kustomization.yaml

          git commit -m \
          "Deploy prod image ${IMAGE_TAG} [skip ci]" \
          || echo "No changes"

          git pull --rebase origin main

          git push origin main
